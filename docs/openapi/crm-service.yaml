openapi: 3.0.3
info:
  title: CRM Service API
  version: 1.0.0
servers:
  - url: http://localhost:8000
paths:
  /api/v1/crm/customers:
    get:
      summary: List customers
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: Create customer
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, phone, tier]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                tier: { type: string }
      responses:
        '200': { description: Created }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
